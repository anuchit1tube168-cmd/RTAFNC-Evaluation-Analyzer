name: Deploy Apps Script Backend

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'google-apps-script/**'
      - '.github/workflows/apps-script-deploy.yml'

jobs:
  deploy-apps-script:
    runs-on: ubuntu-latest
    env:
      DEFAULT_DEPLOYMENT_ID: AKfycbz3Uq3oJtOu95URz2HfcgdPnoRYPdaJfFoRi1Eh9-9sRkTx-_iEODKFNN903N0BcVQq
      APPS_SCRIPT_DEPLOYMENT_ID: ${{ secrets.APPS_SCRIPT_DEPLOYMENT_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Prepare Apps Script project files
        run: |
          mkdir -p gas-dist
          cp google-apps-script/*.gs gas-dist/
          cp google-apps-script/appsscript.json gas-dist/appsscript.json

          # v6 safety: Apps Script file load order can be ambiguous.
          # Append all ZZ_* override files to the end of Code.gs so apiGet_/selfTest_/QA overrides are guaranteed last.
          for f in $(ls google-apps-script/ZZ_*.gs 2>/dev/null | sort); do
            echo "" >> gas-dist/Code.gs
            echo "// ===== appended from ${f} by deploy workflow =====" >> gas-dist/Code.gs
            cat "$f" >> gas-dist/Code.gs
          done
          rm -f gas-dist/ZZ_*.gs

          echo "Files staged for clasp push:"
          ls -1 gas-dist
          echo "Tail of Code.gs after v6 append:"
          tail -n 80 gas-dist/Code.gs

          cd gas-dist
          echo '${{ secrets.CLASP_JSON }}' > .clasp.json
          echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json
          node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync('.clasp.json','utf8'));j.rootDir='.';fs.writeFileSync('.clasp.json',JSON.stringify(j));"
          echo "clasp rootDir set to: $(node -e "console.log(require('./.clasp.json').rootDir)")"

      - name: Install clasp
        run: |
          npm install -g @google/clasp
          clasp --version

      - name: Push Apps Script code
        working-directory: gas-dist
        run: clasp push --force

      - name: Redeploy Web App (clasp v3 create-deployment)
        working-directory: gas-dist
        run: |
          DEPLOYMENT_ID="${APPS_SCRIPT_DEPLOYMENT_ID:-$DEFAULT_DEPLOYMENT_ID}"
          echo "== clasp deploy --help (diagnostic) =="
          clasp deploy --help || true
          echo "== redeploy $DEPLOYMENT_ID =="
          OUT=$(clasp deploy -i "$DEPLOYMENT_ID" -d "GitHub redeploy ${{ github.sha }}" 2>&1); echo "$OUT"
          if echo "$OUT" | grep -qiE "error|Expected [0-9]+ argument|Cannot read properties"; then
            echo "redeploy ล้มเหลว"; exit 1
          fi
