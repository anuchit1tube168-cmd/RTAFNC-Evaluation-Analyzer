name: Deploy Apps Script Backend

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'google-apps-script/**'

jobs:
  deploy-apps-script:
    runs-on: ubuntu-latest
    env:
      DEFAULT_DEPLOYMENT_ID: AKfycbz3Uq3oJtOu95URz2HfcgdPnoRYPdaJfFoRi1Eh9-9sRkTx-_iEODKFNN903N0BcVQq
      APPS_SCRIPT_DEPLOYMENT_ID: ${{ secrets.APPS_SCRIPT_DEPLOYMENT_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Prepare Apps Script project files
        run: |
          mkdir -p gas-dist
          # คัดลอกไฟล์ .gs ทุกไฟล์ (Code.gs + Parser_v5.gs + Code_v5.gs) ไม่ใช่แค่ Code.gs
          # มิฉะนั้น Code.gs จะเรียกฟังก์ชันใน Parser_v5.gs ที่ยังไม่ถูก push -> ReferenceError
          cp google-apps-script/*.gs gas-dist/
          cp google-apps-script/appsscript.json gas-dist/appsscript.json
          echo "Files staged for clasp push:"
          ls -1 gas-dist
          cd gas-dist
          echo '${{ secrets.CLASP_JSON }}' > .clasp.json
          echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Push Apps Script code
        working-directory: gas-dist
        run: clasp push --force

      - name: Create Apps Script version and redeploy Web App
        working-directory: gas-dist
        run: |
          VERSION_OUTPUT=$(clasp version "GitHub deploy ${{ github.sha }}")
          echo "$VERSION_OUTPUT"
          VERSION_NUMBER=$(echo "$VERSION_OUTPUT" | grep -Eo '[0-9]+' | tail -1)
          if [ -z "$VERSION_NUMBER" ]; then
            echo "Could not parse Apps Script version number"
            exit 1
          fi
          DEPLOYMENT_ID="${APPS_SCRIPT_DEPLOYMENT_ID:-$DEFAULT_DEPLOYMENT_ID}"
          echo "Redeploying Apps Script deployment: $DEPLOYMENT_ID with version: $VERSION_NUMBER"
          clasp redeploy "$DEPLOYMENT_ID" "$VERSION_NUMBER" "GitHub redeploy ${{ github.sha }}"
