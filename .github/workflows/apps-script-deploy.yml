name: Deploy Apps Script Backend

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'google-apps-script/**'

jobs:
  deploy-apps-script:
    runs-on: ubuntu-latest
    env:
      DEFAULT_DEPLOYMENT_ID: AKfycbz3Uq3oJtOu95URz2HfcgdPnoRYPdaJfFoRi1Eh9-9sRkTx-_iEODKFNN903N0BcVQq
      APPS_SCRIPT_DEPLOYMENT_ID: ${{ secrets.APPS_SCRIPT_DEPLOYMENT_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Prepare Apps Script project files
        run: |
          mkdir -p gas-dist
          # คัดลอกไฟล์ .gs ทุกไฟล์ (Code.gs + Parser_v5.gs + Code_v5.gs) ไม่ใช่แค่ Code.gs
          # มิฉะนั้น Code.gs จะเรียกฟังก์ชันใน Parser_v5.gs ที่ยังไม่ถูก push -> ReferenceError
          cp google-apps-script/*.gs gas-dist/
          cp google-apps-script/appsscript.json gas-dist/appsscript.json
          echo "Files staged for clasp push:"
          ls -1 gas-dist
          cd gas-dist
          echo '${{ secrets.CLASP_JSON }}' > .clasp.json
          echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json
          # secret CLASP_JSON อาจตั้ง rootDir=google-apps-script (สำหรับใช้ที่ repo root)
          # แต่ที่นี่ clasp รันใน gas-dist จึงต้องบังคับ rootDir="." ไม่งั้น clasp หาไฟล์ไม่เจอ
          # แล้วขึ้น "Script is already up to date" โดยไม่ push อะไรเลย
          node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync('.clasp.json','utf8'));j.rootDir='.';fs.writeFileSync('.clasp.json',JSON.stringify(j));"
          echo "clasp rootDir set to: $(node -e "console.log(require('./.clasp.json').rootDir)")"

      - name: Install clasp
        # pin v2: workflow ใช้ syntax แบบ positional (clasp version / clasp redeploy <id> <ver> <desc>)
        # clasp v3 เปลี่ยนเป็น flag ทำให้ redeploy ล้มเหลว "too many arguments for update-deployment"
        run: npm install -g @google/clasp@2.4.2

      - name: Push Apps Script code
        working-directory: gas-dist
        run: clasp push --force

      - name: Create Apps Script version and redeploy Web App
        working-directory: gas-dist
        run: |
          VERSION_OUTPUT=$(clasp version "GitHub deploy ${{ github.sha }}")
          echo "$VERSION_OUTPUT"
          VERSION_NUMBER=$(echo "$VERSION_OUTPUT" | grep -Eo '[0-9]+' | tail -1)
          if [ -z "$VERSION_NUMBER" ]; then
            echo "Could not parse Apps Script version number"
            exit 1
          fi
          DEPLOYMENT_ID="${APPS_SCRIPT_DEPLOYMENT_ID:-$DEFAULT_DEPLOYMENT_ID}"
          echo "Redeploying Apps Script deployment: $DEPLOYMENT_ID with version: $VERSION_NUMBER"
          REDEPLOY_OUT=$(clasp redeploy "$DEPLOYMENT_ID" "$VERSION_NUMBER" "GitHub redeploy ${{ github.sha }}" 2>&1); echo "$REDEPLOY_OUT"
          # clasp บางเวอร์ชัน print error แต่ exit 0 -> ตรวจข้อความ error เองแล้ว fail
          echo "$REDEPLOY_OUT" | grep -qi "error" && { echo "redeploy ล้มเหลว"; exit 1; }
          echo "$REDEPLOY_OUT" | grep -qi "Deployed" || echo "หมายเหตุ: ไม่พบคำว่า Deployed ในผลลัพธ์ โปรดตรวจ deployment"
