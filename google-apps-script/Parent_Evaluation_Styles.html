<style>
:root{--navy:#071a33;--navy2:#123b70;--blue:#2563eb;--cyan:#06b6d4;--bg:#eef3f9;--card:#fff;--text:#172033;--muted:#667085;--line:#e2e8f0;--ok:#079669;--warn:#d97706;--bad:#dc2626;--shadow:0 20px 55px rgba(8,26,51,.10)}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;min-height:100vh;font-family:"Noto Sans Thai","Leelawadee UI",Tahoma,system-ui,sans-serif;color:var(--text);background:var(--bg)}button,input,select,textarea{font:inherit}button{touch-action:manipulation}

.sidebar{position:sticky;top:0;height:100vh;padding:22px 16px;color:#fff;background:radial-gradient(circle at 18% 0%,rgba(6,182,212,.24),transparent 33%),linear-gradient(160deg,#061426,#102b50);display:flex;flex-direction:column;z-index:20}
.brand{display:flex;align-items:center;gap:13px;padding:5px 8px 22px}.brand-mark{width:50px;height:50px;border-radius:16px;display:grid;place-items:center;font-weight:900;font-size:18px;background:linear-gradient(135deg,#38bdf8,#2563eb);box-shadow:0 12px 28px rgba(37,99,235,.35)}.brand-title{font-size:15px;font-weight:900;line-height:1.35}.brand-sub{font-size:10px;color:#a9c2dc;margin-top:3px}
.nav-label{padding:10px 12px 8px;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#7f9ab6;font-weight:900}.nav{display:grid;gap:6px}.nav-btn{width:100%;border:0;color:#c9d8e8;background:transparent;border-radius:14px;padding:12px 13px;display:flex;align-items:center;gap:12px;text-align:left;cursor:pointer;transition:.2s ease}.nav-btn:hover{background:rgba(255,255,255,.08);color:#fff;transform:translateX(2px)}.nav-btn.active{color:#fff;background:linear-gradient(90deg,rgba(37,99,235,.72),rgba(6,182,212,.24));box-shadow:inset 0 0 0 1px rgba(255,255,255,.12)}.nav-icon{width:32px;height:32px;border-radius:10px;background:rgba(255,255,255,.08);display:grid;place-items:center;font-size:16px;flex:0 0 auto}.nav-text strong{display:block;font-size:12px}.nav-text small{display:block;font-size:9px;margin-top:2px;color:#88a4bf}.nav-btn.active small{color:#cbeeff}
.sidebar-foot{margin-top:auto;padding:14px;border:1px solid rgba(255,255,255,.11);background:rgba(255,255,255,.06);border-radius:16px}.secure-line{display:flex;align-items:center;gap:9px;font-size:11px;font-weight:900}.secure-dot{width:9px;height:9px;border-radius:50%;background:#f59e0b;box-shadow:0 0 0 5px rgba(245,158,11,.12)}.secure-dot.ready{background:#34d399;box-shadow:0 0 0 5px rgba(52,211,153,.12)}.sidebar-foot p{font-size:9px;line-height:1.55;color:#9db1c7;margin:9px 0 0}

.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:20px}.page-title h1{font-size:21px;margin:0;letter-spacing:-.02em}.page-title p{font-size:11px;color:var(--muted);margin:4px 0 0}.system-chip{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.88);border:1px solid var(--line);padding:9px 12px;border-radius:999px;font-size:11px;font-weight:900;box-shadow:0 8px 22px rgba(8,26,51,.05)}.system-chip i{width:8px;height:8px;border-radius:50%;background:#94a3b8}.system-chip.PASS i{background:var(--ok)}.system-chip.REVIEW i{background:var(--warn)}.system-chip.ERROR i{background:var(--bad)}

.pane{animation:fadeUp .25s ease}.hidden{display:none!important}@keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
.section-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin:8px 0 14px}.section-head h3{margin:0;font-size:18px}.section-head p{margin:5px 0 0;color:var(--muted);font-size:11px}.section-badge{padding:7px 10px;border-radius:999px;background:#e9f6ff;color:#0369a1;font-size:9px;font-weight:900;white-space:nowrap}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}.full{grid-column:1/-1}.card{background:rgba(255,255,255,.94);border:1px solid rgba(226,232,240,.92);border-radius:22px;padding:20px;box-shadow:var(--shadow);backdrop-filter:blur(12px)}
.card-title{display:flex;align-items:center;gap:11px;margin-bottom:16px}.card-title .icon{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,#e0f2fe,#dbeafe);color:#075985;display:grid;place-items:center;font-size:19px}.card-title h4{margin:0;font-size:15px}.card-title p{margin:3px 0 0;font-size:10px;color:var(--muted)}
.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:13px 15px}.field.full{grid-column:1/-1}.field label{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:0 0 7px;font-size:11px;font-weight:900;color:#344054}.field label small{font-weight:500;color:#98a2b3}
input,select,textarea{width:100%;outline:0;border:1px solid #d7dfeb;background:#fbfcfe;color:var(--text);border-radius:13px;padding:11px 12px;transition:border .2s,box-shadow .2s,background .2s}input:focus,select:focus,textarea:focus{border-color:#38bdf8;background:#fff;box-shadow:0 0 0 4px rgba(56,189,248,.13)}textarea{min-height:126px;resize:vertical}select{cursor:pointer}.password-wrap{position:relative}.password-wrap input{padding-right:45px}.icon-btn{position:absolute;right:7px;top:50%;transform:translateY(-50%);width:34px;height:34px;border:0;border-radius:10px;background:transparent;color:#64748b;cursor:pointer}.icon-btn:hover{background:#edf4fb}
.btn-row{display:flex;flex-wrap:wrap;gap:9px;margin-top:16px}.btn{border:0;border-radius:13px;padding:11px 15px;display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:900;font-size:11px;cursor:pointer;transition:.18s ease}.btn:hover{transform:translateY(-1px);filter:brightness(1.02)}.btn:active{transform:none}.btn-primary{color:#fff;background:linear-gradient(135deg,#2563eb,#0787b8);box-shadow:0 10px 24px rgba(37,99,235,.23)}.btn-success{color:#fff;background:linear-gradient(135deg,#059669,#0f9f8d)}.btn-warning{color:#fff;background:linear-gradient(135deg,#d97706,#f59e0b)}.btn-ghost{color:#344054;background:#f2f5f9;border:1px solid #e2e8f0}.btn-danger{color:#b42318;background:#fff1f0;border:1px solid #fecaca}
.helper{margin-top:9px;color:var(--muted);font-size:10px;line-height:1.65}.callout{padding:13px 14px;border-radius:14px;background:#f0f9ff;border:1px solid #bae6fd;color:#075985;font-size:10px;line-height:1.65}
.status-panel{display:grid;gap:12px}.status-main{display:flex;align-items:center;gap:14px;padding:16px;border-radius:17px;background:linear-gradient(135deg,#f8fafc,#eff6ff);border:1px solid #dbeafe}.status-orb{width:44px;height:44px;border-radius:50%;display:grid;place-items:center;background:#fff;box-shadow:0 8px 20px rgba(8,26,51,.08)}.status-orb:before{content:"";width:13px;height:13px;border-radius:50%;background:#f59e0b}.status-orb.PASS:before{background:var(--ok)}.status-orb.ERROR:before{background:var(--bad)}.status-main strong{display:block;font-size:16px}.status-main span{font-size:10px;color:var(--muted)}.mini-steps{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.mini-step{padding:10px;border-radius:13px;border:1px solid var(--line);background:#fff}.mini-step b{display:block;font-size:10px}.mini-step span{font-size:8px;color:var(--muted)}
.score-list{display:grid;gap:11px;max-height:560px;overflow:auto;padding-right:4px}.score-card{border:1px solid var(--line);border-radius:16px;padding:14px;background:#fbfdff}.score-head{display:flex;gap:11px;align-items:flex-start}.score-no{width:31px;height:31px;border-radius:10px;display:grid;place-items:center;color:#075985;background:#e0f2fe;font-weight:900;font-size:10px;flex:0 0 auto}.score-text{font-size:11px;line-height:1.6;font-weight:800}.rating{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-top:12px}.rate-btn{height:39px;border:1px solid #d7dfeb;border-radius:11px;background:#fff;color:#64748b;font-weight:900;cursor:pointer;transition:.16s}.rate-btn:hover{border-color:#38bdf8;color:#0369a1;background:#f0f9ff}.rate-btn.selected{border-color:transparent;color:#fff;background:linear-gradient(135deg,#2563eb,#06b6d4);box-shadow:0 7px 17px rgba(37,99,235,.2)}
.empty{padding:38px 20px;text-align:center;border:1px dashed #cbd5e1;border-radius:16px;background:#f8fafc}.empty-icon{font-size:31px;margin-bottom:8px}.empty strong{display:block;font-size:12px}.empty span{display:block;color:var(--muted);font-size:10px;margin-top:5px}
.kpis{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:15px}.kpi{padding:15px;border:1px solid var(--line);border-radius:16px;background:#fff}.kpi span{font-size:9px;color:var(--muted)}.kpi strong{display:block;font-size:23px;margin-top:4px;letter-spacing:-.03em}.kpi em{font-size:9px;color:#0f766e;font-style:normal}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:16px;background:#fff}table{width:100%;border-collapse:collapse;min-width:680px}th,td{padding:12px 13px;text-align:left;border-bottom:1px solid #edf1f6;font-size:10px;vertical-align:top}th{position:sticky;top:0;background:#f8fafc;color:#475467;font-weight:900;z-index:1}tbody tr:hover{background:#f8fbff}.level-pill{display:inline-flex;padding:4px 8px;border-radius:999px;background:#ecfdf5;color:#047857;font-weight:900;font-size:8px}.activity-block{margin:13px 0;padding:17px;border:1px solid var(--line);border-radius:17px;background:#fff}.activity-block h3{margin:0 0 8px;font-size:13px}.activity-meta{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px}.activity-meta span{padding:5px 8px;border-radius:999px;background:#f1f5f9;color:#475569;font-size:8px;font-weight:800}
details.console{margin-top:16px;background:#071426;border-radius:18px;overflow:hidden;box-shadow:0 15px 32px rgba(7,20,38,.18)}details.console summary{cursor:pointer;color:#dbeafe;padding:13px 16px;font-size:10px;font-weight:900;list-style:none;display:flex;justify-content:space-between}details.console summary:after{content:"เปิด/ปิด";color:#7dd3fc;font-size:8px}pre{margin:0;max-height:360px;overflow:auto;padding:16px;background:#071426;color:#a7f3d0;font:10px/1.65 ui-monospace,SFMono-Regular,Menlo,monospace;white-space:pre-wrap}
.loading{position:fixed;inset:0;background:rgba(6,20,38,.42);backdrop-filter:blur(5px);display:grid;place-items:center;z-index:100;opacity:0;pointer-events:none;transition:.2s}.loading.show{opacity:1;pointer-events:auto}.loading-box{min-width:230px;padding:22px;border-radius:20px;background:#fff;text-align:center;box-shadow:0 30px 80px rgba(0,0,0,.22)}.spinner{width:38px;height:38px;margin:0 auto 12px;border:4px solid #e2e8f0;border-top-color:#2563eb;border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.loading-box strong{font-size:12px}.loading-box p{font-size:9px;color:var(--muted);margin:5px 0 0}.toast{position:fixed;right:20px;bottom:20px;z-index:110;max-width:360px;padding:13px 15px;border-radius:15px;background:#0f172a;color:#fff;box-shadow:0 18px 44px rgba(15,23,42,.28);font-size:10px;line-height:1.55;transform:translateY(90px);opacity:0;transition:.25s}.toast.show{transform:none;opacity:1}.toast.success{background:#065f46}.toast.error{background:#991b1b}
@media(max-width:1100px){.app-shell{grid-template-columns:220px minmax(0,1fr)}.sidebar{padding:18px 10px}.nav-text small{display:none}.main{padding:20px}.hero-content{grid-template-columns:1fr}.hero-metrics{max-width:430px}.kpis{grid-template-columns:repeat(2,1fr)}}
@media(max-width:780px){.app-shell{display:block}.sidebar{position:sticky;height:auto;padding:10px 12px;top:0;display:block}.brand{padding:2px 4px 9px}.brand-mark{width:38px;height:38px;border-radius:12px}.brand-sub,.nav-label,.sidebar-foot{display:none}.nav{display:flex;overflow-x:auto;gap:6px;padding-bottom:2px}.nav-btn{min-width:max-content;width:auto;padding:8px 11px}.nav-icon{width:28px;height:28px}.nav-text small{display:none}.main{padding:16px 13px 38px}.topbar{align-items:flex-start}.page-title h1{font-size:17px}.system-chip{padding:7px 9px;font-size:9px}.hero{padding:22px 18px;border-radius:22px}.hero h2{font-size:27px}.grid,.form-grid{grid-template-columns:1fr}.field.full,.full{grid-column:auto}.hero-metrics{grid-template-columns:1fr 1fr}.kpis{grid-template-columns:1fr 1fr}.mini-steps{grid-template-columns:1fr}.card{padding:16px;border-radius:18px}.rating{gap:5px}.rate-btn{height:42px}.toast{left:13px;right:13px;bottom:13px;max-width:none}}
</style>
